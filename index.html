            window.tempAlterEgos[index].desc = document.getElementById('alter-desc-input').value.trim();
            window.tempAlterEgos[index].avatar = window.tempAlterAvatar;

            closeAlterModal();
            updateAlterEgosUI();
        }

        function clearAlterAvatar(index) {
            window.tempAlterAvatar = null;
            const preview = document.getElementById('alter-avatar-preview');
            const alter = window.tempAlterEgos[index];
            preview.style.backgroundImage = '';
            preview.textContent = alter.name.charAt(0);
            preview.classList.remove('has-image');
            document.getElementById('alter-avatar-input').value = '';
        }

        function deleteAlterEgo(index) {
            if (!confirm('确定删除此分身?')) return;
            window.tempAlterEgos.splice(index, 1);
            updateAlterEgosUI();
        }

        // ========== 存储 ==========
        // ========== 最近文件 ==========
        function getRecentFiles() {
            try {
                return JSON.parse(localStorage.getItem('recentFiles') || '[]');
            } catch { return []; }
        }
        
        function saveToRecent(name, data) {
            let recent = getRecentFiles();
            // 移除重复项
            recent = recent.filter(f => f.name !== name);
            // 添加到开头
            recent.unshift({ name, data, time: Date.now() });
            // 只保留最近5个
            if (recent.length > 5) recent = recent.slice(0, 5);
            localStorage.setItem('recentFiles', JSON.stringify(recent));
            updateRecentList();
        }
        
        function toggleRecentFiles() {
            const el = document.getElementById('recent-files');
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
            updateRecentList();
        }
        
        function updateRecentList() {
            const list = document.getElementById('recent-list');
            const recent = getRecentFiles();
            if (recent.length === 0) {
                list.innerHTML = '<div style="color:rgba(255,255,255,0.3);font-size:12px;padding:8px;">暂无最近文件</div>';
                return;
            }
            list.innerHTML = recent.map((f, i) => {
                const time = new Date(f.time).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
                return `<div class="recent-file-item" onclick="loadRecent(${i})">
                    <span class="name">📄 ${f.name}</span>
                    <span class="time">${time}</span>
                </div>`;
            }).join('');
        }
        
        function loadRecent(index) {
            const recent = getRecentFiles();
            if (!recent[index]) return;
            try {
                const data = JSON.parse(recent[index].data);
                characters = data.characters || [];
                relations = data.relations || [];
                customRelationTypes = data.customRelationTypes || [];
                selectedChar = null;
                selectedAlterId = null;
                fileHandle = null;
                updateSaveButton();
                updateSidebar();
                updateRelationDetail();
                render();
                document.getElementById('recent-files').style.display = 'none';
                console.log(`✅ 已加载最近文件: ${recent[index].name}`);
            } catch (err) {
                console.error('加载最近文件失败:', err);
                // 移除损坏的条目
                recent.splice(index, 1);
                localStorage.setItem('recentFiles', JSON.stringify(recent));
                updateRecentList();
            }
        }

        let fileHandle = null; // 保存文件句柄
        
        function updateSaveButton() {
            const quickBtn = document.getElementById('quick-save-btn');
            if (fileHandle) {
                quickBtn.style.display = 'inline-block';
                fileHandle.getFile().then(file => {
                    quickBtn.textContent = `⚡ 保存到 ${file.name}`;
                });
            } else {
                quickBtn.style.display = 'none';
            }
        }
        
        async function quickSave() {
            if (!fileHandle) return;
            try {
                const writable = await fileHandle.createWritable();
                const data = { characters, relations, customRelationTypes };
                await writable.write(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }));
                await writable.close();
                console.log('✅ 快速保存成功');
            } catch (err) {
                console.error('快速保存失败:', err);
                alert('保存失败，请尝试"另存为"');
                fileHandle = null;
                updateSaveButton();
            }
        }
        
        function saveToFile() {
            const data = { characters, relations, customRelationTypes };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            
            // 如果已有文件句柄，直接覆盖保存
            if (fileHandle) {
                fileHandle.getFile().then(file => {
                    if (confirm(`是否覆盖保存到 ${file.name}？`)) {
                        fileHandle.createWritable().then(writable => {
                            writable.write(blob);
                            writable.close();
                            console.log('✅ 已覆盖保存');
                        }).catch(err => {
                            console.error('保存失败:', err);
                            fileHandle = null; // 句柄失效，重新选择
                            saveAsNew();
                        });
                    } else {
                        saveAsNew();
                    }
                });
            } else {
                saveAsNew();
            }
        }
        
        async function saveAsNew() {
            // 尝试使用 File System Access API
            if ('showSaveFilePicker' in window) {
                try {
                    const options = {
                        suggestedName: 'character-relations.json',
                        types: [{
                            description: 'JSON 文件',
                            accept: { 'application/json': ['.json'] }
                        }]
                    };
                    fileHandle = await window.showSaveFilePicker(options);
                    const writable = await fileHandle.createWritable();
                    const data = { characters, relations, customRelationTypes };
                    await writable.write(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }));
                    await writable.close();
                    console.log('✅ 已保存到新文件');
                    updateSaveButton();
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        console.error('保存失败:', err);
                        // 降级到传统方式
                        fallbackSave();
                    }
                }
            } else {
                // 不支持 File System Access API，使用传统方式
                fallbackSave();
            }
        }
        
        function fallbackSave() {
            // 传统下载方式
            const data = { characters, relations, customRelationTypes };
            saveToRecent('character-relations.json', JSON.stringify(data));
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'character-relations.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        async function loadFromFile() {
            // 尝试使用 File System Access API
            if ('showOpenFilePicker' in window) {
                try {
                    const options = {
                        types: [{
                            description: 'JSON 文件',
                            accept: { 'application/json': ['.json'] }
                        }]
                    };
                    const [handle] = await window.showOpenFilePicker(options);
                    const file = await handle.getFile();
                    const text = await file.text();
                    
                    const data = JSON.parse(text);
                    characters = data.characters || [];
                    relations = data.relations || [];
                    customRelationTypes = data.customRelationTypes || [];
                    selectedChar = null;
                    selectedAlterId = null;
                    fileHandle = handle; // 保存文件句柄，后续可直接覆盖
                    updateSaveButton();
                    
                    updateSidebar();
                    updateRelationDetail();
                    render();
                    saveToRecent(file.name, JSON.stringify({ characters, relations }));
                    console.log(`✅ 已加载: ${file.name}`);
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        console.error('加载失败:', err);
                        fallbackLoad();
                    }
                }
            } else {
                fallbackLoad();
            }
        }
        
        function fallbackLoad() {
            // 传统文件选择方式
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = event => {
                    try {
                        const data = JSON.parse(event.target.result);
                        characters = data.characters || [];
                    customRelationTypes = data.customRelationTypes || [];
                        relations = data.relations || [];
                        selectedChar = null;
                        selectedAlterId = null;
                        updateSidebar();
                        updateRelationDetail();
                        render();
                    } catch (err) {
                        alert('文件格式错误');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // 点击外部关闭弹窗
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', e => {
                if (e.target === modal) closeModal();
            });
        });

        // 名字改变时更新头像预览
        document.getElementById('char-name').addEventListener('input', updateAvatarPreview);

        initDemo();
    </script>
