<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人物关系图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #38384a;
            min-height: 100vh;
            overflow: hidden;
        }

        #app {
            display: flex;
            height: 100vh;
        }

        #canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #canvas {
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        #canvas:active {
            cursor: grabbing;
        }

        /* 侧边栏 */
        #sidebar {
            width: 320px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            overflow-y: auto;
            color: #fff;
        }

        .sidebar-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-title::before {
            content: "✦";
            color: #ffd700;
        }

        .recent-file-item {
            padding: 8px;
            margin: 2px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .recent-file-item:hover {
            background: rgba(255,255,255,0.1);
        }
        .recent-file-item .name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .recent-file-item .time {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            margin-left: 8px;
            flex-shrink: 0;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-danger {
            background: rgba(255, 59, 48, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 59, 48, 0.3);
        }

        .btn-danger:hover {
            background: rgba(255, 59, 48, 0.3);
        }

        /* 人物列表 */
        .section-title {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            margin: 20px 0 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .character-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .character-item {
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .character-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .character-item.selected {
            background: rgba(102, 126, 234, 0.2);
            border-color: #667eea;
        }

        .character-item-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
        }

        .character-item-info {
            flex: 1;
            min-width: 0;
        }

        .character-name {
            font-weight: 500;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .character-desc {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1e1e2e;
            border-radius: 12px;
            padding: 24px;
            width: 480px;
            max-width: 90%;
            color: #fff;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-select {
            width: 100%;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
        }

        /* 头像上传 */
        .avatar-upload {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: rgba(255, 255, 255, 0.3);
            background-size: cover;
            background-position: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px dashed rgba(255, 255, 255, 0.2);
        }

        .avatar-preview:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .avatar-preview.has-image {
            border: none;
        }

        .avatar-upload-info {
            flex: 1;
        }

        .avatar-upload-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .avatar-upload-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .color-picker {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .color-option {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .color-option:hover {
            transform: scale(1.1);
        }

        .color-option.selected {
            border-color: #fff;
            box-shadow: 0 0 12px currentColor;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        /* 关系类型选择 */
        .relation-types {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .relation-type-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .relation-type-btn.selected {
            background: #667eea;
        }

        /* 工具栏 */
        #toolbar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tool-btn {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s;
        }

        .tool-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .tool-btn.active {
            background: #667eea;
        }

        /* 帮助提示 */
        #help-hint {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            opacity: 0.8;
        }

        /* 关系详情面板 */
        #relation-detail {
            background: rgba(30, 30, 46, 0.95);
            border-radius: 12px;
            padding: 16px;
            margin-top: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        #relation-detail.active {
            display: block;
        }

        .relation-detail-title {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 10px;
        }

        .relation-item {
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .relation-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .relation-target {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .relation-desc {
            color: rgba(255, 255, 255, 0.6);
        }

        /* 双向关系编辑 */
        .bidirectional-editor {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
        }

        .direction-label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .direction-label .char-name {
            color: #667eea;
            font-weight: 600;
        }

        /* 分身相关样式 */
        .avatar-wrapper {
            position: relative;
            display: inline-block;
        }

        .avatar-badge {
            position: absolute;
            bottom: -2px;
            right: -2px;
            background: #667eea;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 600;
            max-width: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .alter-egos-section {
            margin-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 16px;
        }

        .alter-egos-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .alter-egos-title {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
        }

        .add-alter-btn {
            padding: 4px 12px;
            font-size: 12px;
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.4);
            border-radius: 6px;
            color: #667eea;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-alter-btn:hover {
            background: rgba(102, 126, 234, 0.3);
        }

        .alter-ego-card {
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
        }

        .alter-ego-card:hover {
            border-color: rgba(255,255,255,0.1);
        }

        .alter-ego-card.active {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }

        .alter-ego-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alter-ego-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #fff;
            background-size: cover;
            background-position: center;
        }

        .alter-ego-info {
            flex: 1;
        }

        .alter-ego-name {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        .alter-ego-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-top: 2px;
        }

        .alter-ego-actions {
            display: flex;
            gap: 6px;
        }

        .alter-ego-btn {
            padding: 4px 8px;
            font-size: 11px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 4px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            transition: all 0.2s;
        }

        .alter-ego-btn:hover {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }

        .alter-ego-btn.delete:hover {
            background: rgba(255,107,107,0.2);
            color: #ff6b6b;
        }

        .alter-selector {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .alter-selector-btn {
            padding: 6px 12px;
            font-size: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            transition: all 0.2s;
        }

        .alter-selector-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .alter-selector-btn.selected {
            background: #667eea;
            border-color: #667eea;
            color: #fff;
        }

        /* 分身切换按钮 */
        .alter-switcher {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .alter-switch-btn {
            padding: 5px 10px;
            font-size: 11px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            transition: all 0.2s;
        }

        .alter-switch-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.3);
        }

        .alter-switch-btn.active {
            background: #667eea;
            border-color: #667eea;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="canvas-container">
            <canvas id="canvas"></canvas>
        </div>

        <div id="sidebar">
            <div class="sidebar-title">人物关系图</div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="openAddCharacter()">+ 人物</button>
                <button class="btn btn-secondary" onclick="openAddRelation(selectedChar?.id || null, null)">+ 关系</button>
            </div>

            <div class="btn-group">
                <button class="btn btn-secondary" id="quick-save-btn" style="display:none;" onclick="quickSave()">⚡ 快速保存</button>
                <button class="btn btn-secondary" onclick="saveToFile()">💾 另存为</button>
                <button class="btn btn-secondary" onclick="loadFromFile()">📂 加载</button>
                <button class="btn btn-secondary" onclick="toggleRecentFiles()">📁 最近</button>
            </div>
            <div id="recent-files" style="display:none; margin-top: 8px;">
                <div class="section-title" style="font-size: 12px; margin-bottom: 4px;">最近打开的文件</div>
                <div id="recent-list"></div>
            </div>

            <div class="section-title">人物列表</div>
            <div class="character-list" id="character-list"></div>

            <div id="relation-detail">
                <div class="relation-detail-title">选中人物的关系视角</div>
                <div id="relation-list"></div>
            </div>
        </div>
    </div>

    <!-- 工具栏 -->
    <div id="toolbar">
        <button class="tool-btn active" id="tool-select" title="选择" onclick="setTool('select')">☝️</button>
        <button class="tool-btn" id="tool-add" title="添加人物" onclick="setTool('add')">➕</button>
        <button class="tool-btn" id="tool-connect" title="连接关系" onclick="setTool('connect')">🔗</button>
        <button class="tool-btn" id="tool-delete" title="删除" onclick="setTool('delete')">🗑️</button>
        <button class="tool-btn" id="tool-zoomin" title="放大" onclick="zoomIn()">🔍</button>
        <button class="tool-btn" id="tool-zoomout" title="缩小" onclick="zoomOut()">🔎</button>
        <button class="tool-btn" id="tool-reset" title="重置视图" onclick="resetView()">🏠</button>
    </div>

    <!-- 帮助提示 -->
    <div id="help-hint">点击选择人物 | 拖拽移动 | 双击编辑</div>

    <!-- 添加/编辑人物弹窗 -->
    <div class="modal" id="character-modal">
        <div class="modal-content">
            <div class="modal-title" id="modal-title">添加人物</div>

            <div class="avatar-upload">
                <div class="avatar-preview" id="avatar-preview" onclick="document.getElementById('avatar-input').click()">
                    👤
                </div>
                <div class="avatar-upload-info">
                    <div style="font-size: 14px; margin-bottom: 8px;">上传头像</div>
                    <button class="avatar-upload-btn" onclick="document.getElementById('avatar-input').click()">选择图片</button>
                    <button class="avatar-upload-btn" style="margin-left: 8px;" onclick="clearAvatar()">清除</button>
                    <input type="file" id="avatar-input" accept="image/*" style="display: none;" onchange="handleAvatarUpload(event)">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">人物名称</label>
                <input type="text" class="form-input" id="char-name" placeholder="输入名称">
            </div>

            <div class="form-group">
                <label class="form-label">描述/备注</label>
                <input type="text" class="form-input" id="char-desc" placeholder="可选">
            </div>

            <div class="form-group">
                <label class="form-label">头像背景颜色</label>
                <div class="color-picker" id="avatar-bg-picker"></div>
                <div style="font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 4px;">
                    仅在无头像或头像透明时生效
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">颜色(无头像时使用)</label>
                <div class="color-picker" id="color-picker"></div>
            </div>

            <!-- 分身管理 -->
            <div class="alter-egos-section" id="alter-egos-section" style="display: none;">
                <div class="alter-egos-header">
                    <span class="alter-egos-title">🎭 分身/时期</span>
                    <button class="add-alter-btn" onclick="addAlterEgo()">+ 添加分身</button>
                </div>
                <div id="alter-egos-list"></div>
            </div>

            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveCharacter()">保存</button>
            </div>
        </div>
    </div>

    <!-- 添加/编辑关系弹窗 -->
    <div class="modal" id="relation-modal">
        <div class="modal-content">
            <div class="modal-title" id="relation-modal-title">添加关系</div>

            <div class="form-group">
                <label class="form-label">人物 A</label>
                <select class="form-select" id="relation-from" onchange="updateRelationPreview()"></select>
                <div class="alter-selector" id="alter-selector-from"></div>
            </div>

            <div class="bidirectional-editor">
                <div class="direction-label">
                    <span class="char-name" id="from-name-a">A</span> 眼中的 <span class="char-name" id="to-name-a">B</span>:
                </div>
                <input type="text" class="form-input" id="relation-desc-ab" placeholder="例如:我的挚友、那个叛徒...">
                <textarea class="form-input" id="relation-detail-ab" placeholder="详细描述(可选)..." style="margin-top: 8px; min-height: 60px; resize: vertical;"></textarea>
            </div>

            <div class="bidirectional-editor">
                <div class="direction-label">
                    <span class="char-name" id="from-name-b">B</span> 眼中的 <span class="char-name" id="to-name-b">A</span>:
                </div>
                <input type="text" class="form-input" id="relation-desc-ba" placeholder="例如:值得信赖的人...">
                <textarea class="form-input" id="relation-detail-ba" placeholder="详细描述(可选)..." style="margin-top: 8px; min-height: 60px; resize: vertical;"></textarea>
            </div>

            <div class="form-group" style="margin-top: 16px;">
                <label class="form-label">关系类型</label>
                <div class="relation-types" id="relation-types"></div>
                <div id="custom-color-section" style="display: none; margin-top: 8px;">
                    <label class="form-label" style="font-size: 12px;">自定义颜色</label>
                    <input type="color" id="custom-relation-color" value="#feca57" style="width: 100%; height: 30px; border: none; border-radius: 4px; cursor: pointer;">
                </div>
                <div style="display:flex; gap:6px; margin-top:8px; align-items:center;">
                    <input type="text" id="custom-type-name" class="form-input" placeholder="自定义类型名称" style="flex:1; font-size:12px; padding:6px 8px;">
                    <input type="color" id="custom-type-color" value="#a29bfe" style="width:40px;height:32px;border:none;border-radius:4px;cursor:pointer;flex-shrink:0;">
                    <button class="btn btn-secondary" onclick="addCustomRelationType()" style="font-size:12px;padding:6px 10px;flex-shrink:0;">+ 新增</button>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">人物 B</label>
                <select class="form-select" id="relation-to" onchange="updateRelationPreview()"></select>
                <div class="alter-selector" id="alter-selector-to"></div>
            </div>

            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveRelation()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // ========== 数据结构 ==========
        let characters = [];
        let relations = [];
        let selectedChar = null;
        let editingCharId = null;
        let editingRelationId = null;

        // 当前选中的分身ID(null表示本体)
        let selectedAlterId = null;

        // 被隐藏的人物ID(点选人物时只显示有关系的人)
        let hiddenChars = new Set();

        // 视图状态
        let viewOffset = { x: 0, y: 0 };
        let zoom = 1;
        let isDragging = false;
        let dragTarget = null;
        let dragStart = { x: 0, y: 0 };
        let currentTool = 'select';

        // 连接模式临时状态
        let connectFrom = null;

        // 临时头像数据
        let tempAvatar = null;

        // 颜色选项
        const colors = [
            '#ff6b6b', '#feca57', '#48dbfb', '#1dd1a1', '#5f27cd',
            '#ff9ff3', '#54a0ff', '#00d2d3', '#ff9f43', '#10ac84',
            '#c8d6e5', '#8395a7', '#222f3e', '#576574', '#0abde3'
        ];

        // 头像背景颜色选项
        const avatarBgColors = [
            '#ff6b6b', '#feca57', '#48dbfb', '#1dd1a1', '#5f27cd',
            '#ff9ff3', '#54a0ff', '#00d2d3', '#ff9f43', '#10ac84',
            '#ffffff', '#c8d6e5', '#8395a7', '#2c3e50', '#1abc9c'
        ];

        // 关系类型
        let customRelationTypes = [];

        function getRelationTypes() {
            return [
                { name: '家人', color: '#ff6b6b', style: 'solid' },
                { name: '朋友', color: '#48dbfb', style: 'solid' },
                { name: '恋人', color: '#ff9ff3', style: 'solid' },
                { name: '敌人', color: '#5f27cd', style: 'dashed' },
                { name: '同事', color: '#54a0ff', style: 'solid' },
                { name: '师生', color: '#00d2d3', style: 'solid' },
                { name: '其他', color: '#feca57', style: 'dashed' },
                ...customRelationTypes
            ];
        }

        function addCustomType(name, color) {
            if (!name.trim()) return false;
            const all = getRelationTypes();
            if (all.find(t => t.name === name.trim())) return false;
            customRelationTypes.push({ name: name.trim(), color: color || '#feca57', style: 'solid' });
            return true;
        }

        function removeCustomType(name) {
            customRelationTypes = customRelationTypes.filter(t => t.name !== name);
        }

        // ========== Canvas 初始化 ==========
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // 头像图片缓存
        const avatarCache = new Map();

        function resizeCanvas() {
            const container = document.getElementById('canvas-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            render();
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ========== 工具函数 ==========
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function screenToWorld(x, y) {
            return {
                x: (x - viewOffset.x) / zoom,
                y: (y - viewOffset.y) / zoom
            };
        }

        function worldToScreen(x, y) {
            return {
                x: x * zoom + viewOffset.x,
                y: y * zoom + viewOffset.y
            };
        }

        // ========== 径向居中对齐 ==========
        function centerOnCharacter(charId) {
            const char = characters.find(c => c.id === charId);
            if (!char) return;

            // 找出与该人物本体有关系的所有人
            const connectedIds = new Set([charId]);
            relations.forEach(r => {
                if (r.fromId === charId) connectedIds.add(r.toId);
                if (r.toId === charId) connectedIds.add(r.fromId);
            });

            // 隐藏无关联的人物
            hiddenChars = new Set();
            characters.forEach(c => {
                if (!connectedIds.has(c.id)) hiddenChars.add(c.id);
            });

            const container = document.getElementById('canvas-container');
            const w = container.clientWidth;
            const h = container.clientHeight;

            // 居中点击的人物
            viewOffset.x = w / 2 - char.x * zoom;
            viewOffset.y = h / 2 - char.y * zoom;

            // 将有关系的人物排列成辐射状
            const related = characters.filter(c => c.id !== charId && connectedIds.has(c.id));
            const radius = Math.min(w, h) * 0.32;

            related.forEach((c, i) => {
                const n = related.length;
                let angle;
                if (n === 1) {
                    angle = 0; // 右边
                } else if (n === 2) {
                    angle = Math.PI * i; // i=0:0°(右) i=1:180°(左) → 平角
                } else {
                    angle = (2 * Math.PI * i) / n; // 0°, 120°, 240° …
                }
                c.x = char.x + radius * Math.cos(angle);
                c.y = char.y + radius * Math.sin(angle);
            });

            render();
        }

        function loadAvatarImage(avatarData) {
            return new Promise((resolve) => {
                if (avatarCache.has(avatarData)) {
                    resolve(avatarCache.get(avatarData));
                    return;
                }

                const img = new Image();
                img.onload = () => {
                    avatarCache.set(avatarData, img);
                    resolve(img);
                };
                img.onerror = () => resolve(null);
                img.src = avatarData;
            });
        }

        // ========== 渲染 ==========
        async function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(viewOffset.x, viewOffset.y);
            ctx.scale(zoom, zoom);
            
            // 绘制网格背景（辅助视觉参考）
            drawGrid();

            // 绘制关系线
            for (const rel of relations) {
                const from = characters.find(c => c.id === rel.from);
                const to = characters.find(c => c.id === rel.to);
                if (!from || !to) continue;

                let relType = getRelationTypes().find(r => r.name === rel.type) || getRelationTypes()[6];
                
                // 如果是自定义颜色，使用自定义颜色
                const lineColor = rel.customColor || relType.color;

                // 判断是否应该高亮显示
                // 只有当选中人物且关系双方都匹配当前身份时才高亮
                let isHighlighted = false;
                if (selectedChar) {
                    let charAlterId, otherAlterId;
                    
                    if (rel.from === selectedChar.id) {
                        charAlterId = rel.fromAlterId || null;
                        otherAlterId = rel.toAlterId || null;
                    } else if (rel.to === selectedChar.id) {
                        charAlterId = rel.toAlterId || null;
                        otherAlterId = rel.fromAlterId || null;
                    }
                    
                    if (charAlterId !== undefined) {
                        if (selectedAlterId === null) {
                            // 本体视角：只显示双方都是本体的关系
                            isHighlighted = charAlterId === null && otherAlterId === null;
                        } else {
                            // 分身视角：只显示当前分身的关系
                            isHighlighted = charAlterId === selectedAlterId;
                        }
                    }
                }

                // 计算线的角度和偏移
                const dx = to.x - from.x;
                const dy = to.y - from.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const angle = Math.atan2(dy, dx);

                // 绘制外发光轮廓（增强对比度）
                if (isHighlighted) {
                    ctx.save();
                    ctx.beginPath();
                    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
                    ctx.lineWidth = (5.5) / zoom;
                    if (relType.style === 'dashed') {
                        ctx.setLineDash([5, 5]);
                    } else {
                        ctx.setLineDash([]);
                    }
                    ctx.moveTo(from.x, from.y);
                    ctx.lineTo(to.x, to.y);
                    ctx.stroke();
                    ctx.restore();
                }

                // 绘制主线条
                ctx.beginPath();
                ctx.strokeStyle = isHighlighted ? lineColor : lineColor + '60';
                ctx.lineWidth = (isHighlighted ? 2.5 : 1.5) / zoom;

                if (relType.style === 'dashed') {
                    ctx.setLineDash([5, 5]);
                } else {
                    ctx.setLineDash([]);
                }

                ctx.moveTo(from.x, from.y);
                ctx.lineTo(to.x, to.y);
                ctx.stroke();

                // 绘制箭头：只显示选中人物指向其他人的箭头
                if (isHighlighted) {
                    if (selectedChar.id === rel.from) {
                        // A选中，显示A→B：A眼中的B，箭头指向B
                        drawArrow(from.x, from.y, to.x, to.y, lineColor, false);
                    } else if (selectedChar.id === rel.to) {
                        // B选中，显示B→A：B眼中的A，箭头指向A
                        // 由于关系是A到B，所以要反向绘制箭头（从B指向A）
                        drawArrow(from.x, from.y, to.x, to.y, lineColor, true);
                    }
                }

                // 只在选中人物时显示描述，显示选中人物对对方的看法
                if (isHighlighted) {
                    const midX = (from.x + to.x) / 2;
                    const midY = (from.y + to.y) / 2;

                    // 计算偏移
                    const labelOffset = 25 / zoom;
                    const perpX = -Math.sin(angle) * labelOffset;
                    const perpY = Math.cos(angle) * labelOffset;

                    // 确定显示哪个描述
                    let label = '';
                    let labelX = midX;
                    let labelY = midY;
                    
                    if (selectedChar.id === rel.from) {
                        // A选中，显示A对B的看法（descAB）
                        label = rel.descAB;
                        if (rel.toAlterId) {
                            const toChar = characters.find(c => c.id === rel.to);
                            const alter = toChar?.alterEgos?.find(a => a.id === rel.toAlterId);
                            if (alter) label += ` (${alter.name})`;
                        }
                        // 标签放在正中间
                        labelX = midX + perpX;
                        labelY = midY + perpY;
                    } else if (selectedChar.id === rel.to) {
                        // B选中，显示B对A的看法（descBA）
                        label = rel.descBA;
                        if (rel.fromAlterId) {
                            const fromChar = characters.find(c => c.id === rel.from);
                            const alter = fromChar?.alterEgos?.find(a => a.id === rel.fromAlterId);
                            if (alter) label += ` (${alter.name})`;
                        }
                        // 标签放在正中间
                        labelX = midX + perpX;
                        labelY = midY + perpY;
                    }
                    
                    if (label) {
                        drawLabel(labelX, labelY, label, lineColor);
                    }
                }
            }

            // 绘制人物节点
            for (const char of characters) {
                if (hiddenChars.has(char.id)) continue;
                const isSelected = selectedChar && selectedChar.id === char.id;
                const radius = 40 / zoom;

                // 光晕效果
                if (isSelected) {
                    ctx.beginPath();
                    ctx.arc(char.x, char.y, radius + 12, 0, Math.PI * 2);
                    ctx.fillStyle = char.color + '30';
                    ctx.fill();
                }

                // 节点背景
                ctx.beginPath();
                ctx.arc(char.x, char.y, radius, 0, Math.PI * 2);

                if (char.avatar) {
                    // 有头像
                    const img = await loadAvatarImage(char.avatar);
                    if (img) {
                        ctx.save();
                        ctx.beginPath();
                        ctx.arc(char.x, char.y, radius, 0, Math.PI * 2);
                        ctx.closePath();
                        ctx.clip();
                        ctx.drawImage(img, char.x - radius, char.y - radius, radius * 2, radius * 2);
                        ctx.restore();

                        // 边框
                        ctx.strokeStyle = isSelected ? '#fff' : 'rgba(255,255,255,0.5)';
                        ctx.lineWidth = isSelected ? 4 / zoom : 2 / zoom;
                        ctx.stroke();
                    } else {
                        drawColorNode(char, radius, isSelected);
                    }
                } else {
                    drawColorNode(char, radius, isSelected);
                }

                // 名称
                ctx.font = `bold ${14 / zoom}px sans-serif`;
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(char.name, char.x, char.y + radius + 16 / zoom);
            }

            ctx.restore();
        }

        function drawColorNode(char, radius, isSelected) {
            const bgColor = char.avatarBgColor || '#667eea';

            // 渐变填充
            const gradient = ctx.createRadialGradient(
                char.x - 5, char.y - 5, 0,
                char.x, char.y, radius
            );
            gradient.addColorStop(0, bgColor);
            gradient.addColorStop(1, adjustColor(bgColor, -30));

            ctx.fillStyle = gradient;
            ctx.fill();

            // 边框
            ctx.strokeStyle = isSelected ? '#fff' : 'rgba(255,255,255,0.3)';
            ctx.lineWidth = isSelected ? 3 / zoom : 1 / zoom;
            ctx.stroke();

            // 名字首字
            ctx.font = `bold ${18 / zoom}px sans-serif`;
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(char.name.charAt(0), char.x, char.y);
        }

        function drawGrid() {
            const gridSize = 80;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.06)';
            ctx.lineWidth = 0.5 / zoom;
            
            const left = -viewOffset.x / zoom;
            const top = -viewOffset.y / zoom;
            const right = left + canvas.width / zoom;
            const bottom = top + canvas.height / zoom;
            
            const startX = Math.floor(left / gridSize) * gridSize;
            const startY = Math.floor(top / gridSize) * gridSize;
            
            for (let x = startX; x <= right; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, top);
                ctx.lineTo(x, bottom);
                ctx.stroke();
            }
            for (let y = startY; y <= bottom; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(left, y);
                ctx.lineTo(right, y);
                ctx.stroke();
            }
        }

        function drawArrow(x1, y1, x2, y2, color, reverse = false) {
            const headLen = 10 / zoom;
            const dx = x2 - x1;
            const dy = y2 - y1;
            const angle = Math.atan2(dy, dx);

            const radius = 40 / zoom;
            const dist = Math.sqrt(dx*dx + dy*dy);

            // 箭头位置:正向指向终点,反向指向起点
            let endX, endY, arrowAngle;
            if (reverse) {
                // 反向:箭头指向起点(x1, y1)
                const ratio = radius / dist;
                endX = x1 + dx * ratio;
                endY = y1 + dy * ratio;
                arrowAngle = angle + Math.PI;
            } else {
                // 正向:箭头指向终点(x2, y2)
                const ratio = (dist - radius) / dist;
                endX = x1 + dx * ratio;
                endY = y1 + dy * ratio;
                arrowAngle = angle;
            }

            // 绘制箭头外发光轮廓
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 4 / zoom;
            ctx.setLineDash([]);
            ctx.moveTo(endX, endY);
            ctx.lineTo(endX - headLen * Math.cos(arrowAngle - Math.PI/6), endY - headLen * Math.sin(arrowAngle - Math.PI/6));
            ctx.moveTo(endX, endY);
            ctx.lineTo(endX - headLen * Math.cos(arrowAngle + Math.PI/6), endY - headLen * Math.sin(arrowAngle + Math.PI/6));
            ctx.stroke();

            // 绘制箭头本体
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = 2 / zoom;
            ctx.setLineDash([]);
            ctx.moveTo(endX, endY);
            ctx.lineTo(endX - headLen * Math.cos(arrowAngle - Math.PI/6), endY - headLen * Math.sin(arrowAngle - Math.PI/6));
            ctx.moveTo(endX, endY);
            ctx.lineTo(endX - headLen * Math.cos(arrowAngle + Math.PI/6), endY - headLen * Math.sin(arrowAngle + Math.PI/6));
            ctx.stroke();
        }

        function drawLabel(x, y, text, color) {
            if (!text) return;

            // 使用更大的字体，并启用抗锯齿
            const fontSize = Math.max(14, 14 / zoom);
            ctx.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif`;
            ctx.textRenderingOptimization = 'optimizeLegibility';
            
            const textWidth = ctx.measureText(text).width;
            const paddingX = 12;
            const paddingY = 10;
            const height = fontSize + paddingY * 1.5;

            // 背景 - 更明显的边框和阴影
            ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
            ctx.shadowBlur = 8;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;
            ctx.fillStyle = 'rgba(20, 20, 35, 0.98)';
            ctx.beginPath();
            ctx.roundRect(x - textWidth/2 - paddingX, y - height/2, textWidth + paddingX * 2, height, 6 / zoom);
            ctx.fill();
            
            // 边框 - 使用关系线颜色
            ctx.shadowColor = 'transparent';
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.5 / zoom;
            ctx.stroke();

            // 文字 - 白色更清晰
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, x, y);
        }

        function adjustColor(color, amount) {
            const hex = color.replace('#', '');
            const r = Math.max(0, Math.min(255, parseInt(hex.substr(0, 2), 16) + amount));
            const g = Math.max(0, Math.min(255, parseInt(hex.substr(2, 2), 16) + amount));
            const b = Math.max(0, Math.min(255, parseInt(hex.substr(4, 2), 16) + amount));
            return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
        }

        // ========== 交互 ==========
        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            const world = screenToWorld(mouseX, mouseY);

            const clicked = findCharacterAt(world.x, world.y);

            if (currentTool === 'select') {
                if (clicked) {
                    selectedChar = clicked;
                    selectedAlterId = null; // 点击Canvas时重置为本体
                    dragTarget = clicked;
                    dragStart = { x: world.x - clicked.x, y: world.y - clicked.y };
                    updateSidebar();
                    updateRelationDetail();
                    centerOnCharacter(clicked.id);
                } else {
                    selectedChar = null;
                    selectedAlterId = null; // 取消选择时也重置
                    hiddenChars = new Set(); // 点击空白恢复显示全部人物
                    isDragging = true;
                    dragStart = { x: mouseX - viewOffset.x, y: mouseY - viewOffset.y };
                    updateRelationDetail();
                }
            } else if (currentTool === 'add') {
                addCharacterAt(world.x, world.y);
            } else if (currentTool === 'connect') {
                if (clicked) {
                    if (!connectFrom) {
                        connectFrom = clicked;
                        selectedChar = clicked;
                    } else if (connectFrom.id !== clicked.id) {
                        openAddRelation(connectFrom.id, clicked.id);
                        connectFrom = null;
                    }
                }
            } else if (currentTool === 'delete') {
                if (clicked) {
                    deleteCharacter(clicked.id);
                }
            }

            render();
        });

        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            if (isDragging) {
                viewOffset.x = mouseX - dragStart.x;
                viewOffset.y = mouseY - dragStart.y;
                render();
            } else if (dragTarget) {
                const world = screenToWorld(mouseX, mouseY);
                dragTarget.x = world.x - dragStart.x;
                dragTarget.y = world.y - dragStart.y;
                render();
            }
        });

        canvas.addEventListener('mouseup', () => {
            isDragging = false;
            dragTarget = null;
        });

        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
            const newZoom = Math.max(0.3, Math.min(3, zoom * zoomFactor));

            viewOffset.x = mouseX - (mouseX - viewOffset.x) * (newZoom / zoom);
            viewOffset.y = mouseY - (mouseY - viewOffset.y) * (newZoom / zoom);
            zoom = newZoom;

            render();
        });

        canvas.addEventListener('dblclick', e => {
            const rect = canvas.getBoundingClientRect();
            const world = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
            const clicked = findCharacterAt(world.x, world.y);

            if (clicked) {
                editCharacter(clicked.id);
            }
        });

        function findCharacterAt(x, y) {
            const radius = 40;
            return characters.find(c => {
                const dx = x - c.x;
                const dy = y - c.y;
                return Math.sqrt(dx*dx + dy*dy) < radius;
            });
        }

        // ========== 工具栏 ==========
        function setTool(tool) {
            currentTool = tool;
            connectFrom = null;

            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tool-' + tool)?.classList.add('active');

            updateHelpHint();
        }

        function updateHelpHint() {
            const hints = {
                'select': '点击选择人物 | 拖拽移动 | 双击编辑',
                'add': '点击空白处添加人物',
                'connect': '依次点击两个人物建立关系',
                'delete': '点击人物删除'
            };
            document.getElementById('help-hint').textContent = hints[currentTool] || '';
        }

        function zoomIn() {
            zoom = Math.min(3, zoom * 1.2);
            render();
        }

        function zoomOut() {
            zoom = Math.max(0.3, zoom * 0.8);
            render();
        }

        function resetView() {
            zoom = 1;
            viewOffset = { x: 0, y: 0 };
            render();
        }

        // ========== 头像处理 ==========
        function handleAvatarUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > 2 * 1024 * 1024) {
                alert('图片大小不能超过 2MB');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                tempAvatar = e.target.result;
                updateAvatarPreview();
            };
            reader.readAsDataURL(file);
        }

        function updateAvatarPreview() {
            const preview = document.getElementById('avatar-preview');
            const avatarBgColor = document.querySelector('#avatar-bg-picker .color-option.selected')?.dataset.color || '#667eea';

            if (tempAvatar) {
                preview.style.backgroundImage = `url(${tempAvatar})`;
                preview.style.backgroundColor = '';
                preview.textContent = '';
                preview.classList.add('has-image');
            } else {
                const name = document.getElementById('char-name').value.trim();
                preview.style.backgroundImage = '';
                preview.style.backgroundColor = avatarBgColor;
                preview.textContent = name ? name.charAt(0) : '👤';
                preview.classList.remove('has-image');
            }
        }

        function clearAvatar() {
            tempAvatar = null;
            document.getElementById('avatar-input').value = '';
            updateAvatarPreview();
        }

        // ========== 人物操作 ==========
        function addCharacterAt(x, y) {
            editingCharId = null;
            tempAvatar = null;
            window.tempAlterEgos = [];
            document.getElementById('char-name').value = '';
            document.getElementById('char-desc').value = '';
            initColorPicker();
            initAvatarBgPicker();
            updateAvatarPreview();
            updateAlterEgosUI();
            document.getElementById('alter-egos-section').style.display = 'none';
            window.tempPos = { x, y };
            document.getElementById('modal-title').textContent = '添加人物';
            document.getElementById('character-modal').classList.add('active');
        }

        function openAddCharacter() {
            editingCharId = null;
            tempAvatar = null;
            window.tempAlterEgos = [];
            document.getElementById('char-name').value = '';
            document.getElementById('char-desc').value = '';
            initColorPicker();
            initAvatarBgPicker();
            updateAvatarPreview();
            updateAlterEgosUI();
            document.getElementById('alter-egos-section').style.display = 'none';
            window.tempPos = {
                x: 200 + Math.random() * 400,
                y: 200 + Math.random() * 300
            };
            document.getElementById('modal-title').textContent = '添加人物';
            document.getElementById('character-modal').classList.add('active');
        }

        function editCharacter(id) {
            const char = characters.find(c => c.id === id);
            if (!char) return;

            editingCharId = id;
            tempAvatar = char.avatar || null;
            window.tempAlterEgos = char.alterEgos ? JSON.parse(JSON.stringify(char.alterEgos)) : [];
            document.getElementById('char-name').value = char.name;
            document.getElementById('char-desc').value = char.desc || '';
            initColorPicker(char.color);
            initAvatarBgPicker(char.avatarBgColor);
            updateAvatarPreview();
            updateAlterEgosUI();
            document.getElementById('alter-egos-section').style.display = 'block';
            document.getElementById('modal-title').textContent = '编辑人物';
            document.getElementById('character-modal').classList.add('active');
        }

        function saveCharacter() {
            const name = document.getElementById('char-name').value.trim();
            if (!name) {
                alert('请输入人物名称');
                return;
            }

            const color = document.querySelector('#color-picker .color-option.selected')?.dataset.color || colors[0];
            const avatarBgColor = document.querySelector('#avatar-bg-picker .color-option.selected')?.dataset.color || avatarBgColors[0];
            const alterEgos = window.tempAlterEgos || [];

            if (editingCharId) {
                const char = characters.find(c => c.id === editingCharId);
                if (char) {
                    char.name = name;
                    char.desc = document.getElementById('char-desc').value.trim();
                    char.color = color;
                    char.avatar = tempAvatar;
                    char.avatarBgColor = avatarBgColor;
                    char.alterEgos = alterEgos;
                }
            } else {
                characters.push({
                    id: generateId(),
                    name,
                    desc: document.getElementById('char-desc').value.trim(),
                    color,
                    avatar: tempAvatar,
                    avatarBgColor,
                    alterEgos,
                    x: window.tempPos?.x || 300,
                    y: window.tempPos?.y || 300
                });
                hiddenChars = new Set(); // 新增人物后恢复全部显示
            }

            closeModal();
            updateSidebar();
            render();
        }

        function deleteCharacter(id) {
            if (!confirm('确定删除此人物?相关关系也会被删除。')) return;

            characters = characters.filter(c => c.id !== id);
            relations = relations.filter(r => r.from !== id && r.to !== id);

            if (selectedChar && selectedChar.id === id) {
                selectedChar = null;
            }

            updateSidebar();
            updateRelationDetail();
            render();
        }

        // ========== 关系操作 ==========
        function openAddRelation(fromId, toId) {
            editingRelationId = null;

            const selectFrom = document.getElementById('relation-from');
            const selectTo = document.getElementById('relation-to');

            selectFrom.innerHTML = characters.map(c =>
                `<option value="${c.id}">${c.name}</option>`
            ).join('');

            selectTo.innerHTML = selectFrom.innerHTML;

            if (fromId) selectFrom.value = fromId;
            if (toId) selectTo.value = toId;

            document.getElementById('relation-desc-ab').value = '';
            document.getElementById('relation-desc-ba').value = '';
            document.getElementById('relation-detail-ab').value = '';
            document.getElementById('relation-detail-ba').value = '';

            updateRelationTypesUI();

            document.getElementById('relation-modal-title').textContent = '添加关系';
            updateRelationPreview();
            document.getElementById('relation-modal').classList.add('active');
        }

        function updateRelationPreview() {
            const fromId = document.getElementById('relation-from').value;
            const toId = document.getElementById('relation-to').value;

            const fromChar = characters.find(c => c.id === fromId);
            const toChar = characters.find(c => c.id === toId);

            document.getElementById('from-name-a').textContent = fromChar?.name || 'A';
            document.getElementById('to-name-a').textContent = toChar?.name || 'B';
            document.getElementById('from-name-b').textContent = toChar?.name || 'B';
            document.getElementById('to-name-b').textContent = fromChar?.name || 'A';

            // 更新分身选择器
            updateAlterSelector('from', fromChar);
            updateAlterSelector('to', toChar);
        }

        function updateAlterSelector(side, char) {
            const container = document.getElementById(`alter-selector-${side}`);
            if (!char || !char.alterEgos || char.alterEgos.length === 0) {
                container.innerHTML = '';
                return;
            }

            // 默认选择"本体"
            container.innerHTML = `
                <button class="alter-selector-btn selected" data-alter-id="" onclick="selectAlter('${side}', this)">本体</button>
                ${char.alterEgos.map(alter => `
                    <button class="alter-selector-btn" data-alter-id="${alter.id}" onclick="selectAlter('${side}', this)">${alter.name}</button>
                `).join('')}
            `;
        }

        function selectAlter(side, btn) {
            const container = document.getElementById(`alter-selector-${side}`);
            container.querySelectorAll('.alter-selector-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function selectRelationType(btn) {
            document.querySelectorAll('.relation-type-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');

            // 如果选择"其他",显示颜色选择器
            const customSection = document.getElementById('custom-color-section');
            if (btn.dataset.type === '其他') {
                customSection.style.display = 'block';
            } else {
                customSection.style.display = 'none';
            }
        }

        function addCustomRelationType() {
            const name = document.getElementById('custom-type-name').value.trim();
            const color = document.getElementById('custom-type-color').value;
            if (!name) { alert('请输入类型名称'); return; }
            if (!addCustomType(name, color)) { alert('该类型已存在'); return; }
            document.getElementById('custom-type-name').value = '';
            document.getElementById('custom-type-name').placeholder = '✅ ' + name + ' 已添加';
            setTimeout(() => {
                document.getElementById('custom-type-name').placeholder = '自定义类型名称';
            }, 2000);
            updateRelationTypesUI();
            // 自动选中刚添加的类型
            const btns = document.querySelectorAll('.relation-type-btn');
            btns.forEach(b => {
                if (b.dataset.type === name) selectRelationType(b);
            });
        }

        function deleteCustomType(name) {
            if (!confirm('删除类型「' + name + '」？已有的关系不会受影响，但不再显示此类型按钮。')) return;
            removeCustomType(name);
            updateRelationTypesUI();
        }

        function updateRelationTypesUI() {
            const typesContainer = document.getElementById('relation-types');
            const allTypes = getRelationTypes();
            const selectedType = typesContainer.querySelector('.selected');
            const selectedName = selectedType ? selectedType.dataset.type : allTypes[0].name;
            typesContainer.innerHTML = allTypes.map((r, i) => {
                const isCustom = customRelationTypes.some(t => t.name === r.name);
                return '<div style="display:inline-flex;align-items:center;margin:2px;">' +
                    '<button class="relation-type-btn ' + (r.name === selectedName ? 'selected' : '') + '"' +
                    ' data-type="' + r.name + '"' +
                    ' onclick="selectRelationType(this)">' + r.name + '</button>' +
                    (isCustom ? '<span onclick="deleteCustomType(\'' + r.name.replace(/'/g, "\\'") + '\')" style="font-size:10px;color:rgba(255,255,255,0.4);cursor:pointer;margin-left:-12px;padding:2px;" title="删除此类型">✕</span>' : '') +
                    '</div>';
            }).join('');
        }

        function saveRelation() {
            const from = document.getElementById('relation-from').value;
            const to = document.getElementById('relation-to').value;
            const type = document.querySelector('.relation-type-btn.selected')?.dataset.type;
            const descAB = document.getElementById('relation-desc-ab').value.trim();
            const descBA = document.getElementById('relation-desc-ba').value.trim();
            const detailAB = document.getElementById('relation-detail-ab').value.trim();
            const detailBA = document.getElementById('relation-detail-ba').value.trim();

            // 获取分身选择
            const fromAlterBtn = document.querySelector('#alter-selector-from .alter-selector-btn.selected');
            const toAlterBtn = document.querySelector('#alter-selector-to .alter-selector-btn.selected');
            const fromAlterId = fromAlterBtn?.dataset.alterId || null;
            const toAlterId = toAlterBtn?.dataset.alterId || null;

            // 获取自定义颜色
            let customColor = null;
            if (type === '其他') {
                customColor = document.getElementById('custom-relation-color')?.value || '#feca57';
            }

            if (from === to) {
                alert('请选择不同的人物');
                return;
            }

            // 检查是否已存在相同的身份关系(考虑分身)
            const exists = relations.find(r => {
                const samePersons = (r.from === from && r.to === to) || (r.from === to && r.to === from);
                if (!samePersons) return false;

                // 检查身份组合(正向和反向都要检查)
                const rFromAlter = r.fromAlterId || null;
                const rToAlter = r.toAlterId || null;

                // 正向匹配:A的某个身份 -> B的某个身份
                const forwardMatch = rFromAlter === fromAlterId && rToAlter === toAlterId;
                // 反向匹配:B的某个身份 -> A的某个身份
                const backwardMatch = rFromAlter === toAlterId && rToAlter === fromAlterId;

                return forwardMatch || backwardMatch;
            });

            if (exists && !editingRelationId) {
                alert('这两个身份之间已有关系,请选择不同的分身组合');
                return;
            }

            if (editingRelationId) {
                const rel = relations.find(r => r.id === editingRelationId);
                if (rel) {
                    rel.from = from;
                    rel.to = to;
                    rel.type = type;
                    rel.descAB = descAB;
                    rel.descBA = descBA;
                    rel.detailAB = detailAB;
                    rel.detailBA = detailBA;
                    rel.fromAlterId = fromAlterId;
                    rel.toAlterId = toAlterId;
                    rel.customColor = customColor;
                }
            } else {
                relations.push({
                    id: generateId(),
                    from,
                    to,
                    type,
                    descAB,
                    descBA,
                    detailAB,
                    detailBA,
                    fromAlterId,
                    toAlterId,
                    customColor
                });
            }

            closeModal();
            updateRelationDetail();
            render();
        }

        // ========== UI 辅助 ==========
        function closeModal() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            editingCharId = null;
            editingRelationId = null;
            window.tempPos = null;
            tempAvatar = null;
        }

        function initColorPicker(selectedColor) {
            const picker = document.getElementById('color-picker');
            picker.innerHTML = colors.map(c =>
                `<div class="color-option ${c === (selectedColor || colors[0]) ? 'selected' : ''}"
                     style="background: ${c}"
                     data-color="${c}"
                     onclick="selectColor(this, 'color-picker')"></div>`
            ).join('');
        }

        function initAvatarBgPicker(selectedColor) {
            const picker = document.getElementById('avatar-bg-picker');
            picker.innerHTML = avatarBgColors.map(c =>
                `<div class="color-option ${c === (selectedColor || '#667eea') ? 'selected' : ''}"
                     style="background: ${c}"
                     data-color="${c}"
                     onclick="selectColor(this, 'avatar-bg-picker')"></div>`
            ).join('');
        }

        function selectColor(el, pickerId) {
            document.querySelectorAll(`#${pickerId} .color-option`).forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
        }

        function updateSidebar() {
            const list = document.getElementById('character-list');
            list.innerHTML = characters.filter(c => !hiddenChars.has(c.id)).map(c => {
                const avatarStyle = c.avatar
                    ? `background-image: url(${c.avatar}); background-size: cover; background-position: center;`
                    : `background: ${c.avatarBgColor || c.color};`;
                const hasAlterEgos = c.alterEgos && c.alterEgos.length > 0;
                const isSelected = selectedChar && selectedChar.id === c.id;

                return `
                    <div class="character-item ${isSelected ? 'selected' : ''}"
                         onclick="selectCharFromList('${c.id}')"
                         ondblclick="editCharacter('${c.id}')">
                        <div class="avatar-wrapper">
                            <div class="character-item-avatar" style="${avatarStyle}">
                                ${c.avatar ? '' : c.name.charAt(0)}
                            </div>
                            ${hasAlterEgos ? `<div class="avatar-badge">${c.alterEgos.length}</div>` : ''}
                        </div>
                        <div class="character-item-info">
                            <div class="character-name" style="color: ${c.color}">${c.name}</div>
                            <div class="character-desc">${selectedAlterId && isSelected ? (c.alterEgos?.find(a => a.id === selectedAlterId)?.desc || c.desc) : c.desc || '无描述'}</div>
                        </div>
                        ${isSelected && hasAlterEgos ? `
                            <div class="alter-switcher">
                                <button class="alter-switch-btn ${!selectedAlterId ? 'active' : ''}" onclick="event.stopPropagation(); switchAlter('${c.id}', null)">本体</button>
                                ${c.alterEgos.map(a => `<button class="alter-switch-btn ${selectedAlterId === a.id ? 'active' : ''}" onclick="event.stopPropagation(); switchAlter('${c.id}', '${a.id}')">${a.name}</button>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        function selectCharFromList(id) {
            selectedChar = characters.find(c => c.id === id);
            selectedAlterId = null; // 切换人物时重置为本体
            updateSidebar();
            updateRelationDetail();
            centerOnCharacter(id);
        }

        function switchAlter(charId, alterId) {
            if (selectedChar && selectedChar.id === charId) {
                selectedAlterId = alterId;
                updateSidebar();
                updateRelationDetail();
                render();
            }
        }

        function updateRelationDetail() {
            const detail = document.getElementById('relation-detail');
            const list = document.getElementById('relation-list');

            if (!selectedChar) {
                detail.classList.remove('active');
                return;
            }

            detail.classList.add('active');

            // 获取当前选中的身份(本体或分身)
            const currentAlterId = selectedAlterId;

            // 过滤与当前身份相关的关系
            // 规则：from和to都必须是当前身份（本体或分身）
            const relatedRels = relations.filter(r => {
                let charId, otherId, alterId, otherAlterId;
                
                if (r.from === selectedChar.id) {
                    charId = r.from;
                    otherId = r.to;
                    alterId = r.fromAlterId || null;
                    otherAlterId = r.toAlterId || null;
                } else if (r.to === selectedChar.id) {
                    charId = r.to;
                    otherId = r.from;
                    alterId = r.toAlterId || null;
                    otherAlterId = r.fromAlterId || null;
                } else {
                    return false;
                }
                
                // 只匹配当前身份（本体或分身）的关系
                // 如果当前是本体，只显示对方本体的关系
                if (currentAlterId === null) {
                    return alterId === null && otherAlterId === null;
                } else {
                    // 如果当前是分身，显示与该分身相关的关系
                    return alterId === currentAlterId;
                }
            });

            list.innerHTML = relatedRels.map(rel => {
                const isFrom = rel.from === selectedChar.id;
                const otherId = isFrom ? rel.to : rel.from;
                const other = characters.find(c => c.id === otherId);
                const desc = isFrom ? rel.descAB : rel.descBA;
                const detailText = isFrom ? rel.detailAB : rel.detailBA;
                const relType = getRelationTypes().find(r => r.name === rel.type) || getRelationTypes()[6];

                // 确定对方的身份(本体还是分身)
                const otherAlterId = isFrom ? rel.toAlterId : rel.fromAlterId;
                const otherAlter = other?.alterEgos?.find(a => a.id === otherAlterId);
                const displayName = otherAlter ? `${other.name}-${otherAlter.name}` : `${other?.name || '未知'}(本体)`;

                return `
                    <div class="relation-item" onclick="editRelation('${rel.id}')" style="border-left: 3px solid ${rel.customColor || relType.color}">
                        <div class="relation-target" style="color: ${other?.color || '#fff'}">
                            ${displayName}
                        </div>
                        <div class="relation-desc">${desc || '无描述'}</div>
                        ${detailText ? `<div class="relation-detail-text" style="font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 4px;">${detailText}</div>` : ''}
                    </div>
                `;
            }).join('') || '<div style="color: rgba(255,255,255,0.5); font-size: 13px;">暂无关系</div>';
        }

        function editRelation(id) {
            const rel = relations.find(r => r.id === id);
            if (!rel) return;

            editingRelationId = id;

            const selectFrom = document.getElementById('relation-from');
            const selectTo = document.getElementById('relation-to');

            selectFrom.innerHTML = characters.map(c =>
                `<option value="${c.id}">${c.name}</option>`
            ).join('');
            selectTo.innerHTML = selectFrom.innerHTML;

            selectFrom.value = rel.from;
            selectTo.value = rel.to;

            document.getElementById('relation-desc-ab').value = rel.descAB || '';
            document.getElementById('relation-desc-ba').value = rel.descBA || '';
            document.getElementById('relation-detail-ab').value = rel.detailAB || '';
            document.getElementById('relation-detail-ba').value = rel.detailBA || '';

            updateRelationTypesUI();

            // 选中当前关系类型
            const allTypes = getRelationTypes();
            const typeBtn = document.querySelector('#relation-types .relation-type-btn[data-type="' + rel.type.replace(/"/g, '') + '"]');
            if (typeBtn) selectRelationType(typeBtn);

            // 恢复自定义颜色
            const customSection = document.getElementById('custom-color-section');
            if (rel.type === '其他' && rel.customColor) {
                customSection.style.display = 'block';
                document.getElementById('custom-relation-color').value = rel.customColor;
            } else {
                customSection.style.display = 'none';
            }

            document.getElementById('relation-modal-title').textContent = '编辑关系';
            updateRelationPreview();

            // 恢复分身选择(延时确保DOM已更新)
            setTimeout(() => {
                // 先选择本体(默认)
                const fromMainBtn = document.querySelector('#alter-selector-from button[data-alter-id=""]');
                const toMainBtn = document.querySelector('#alter-selector-to button[data-alter-id=""]');
                if (fromMainBtn) selectAlter('from', fromMainBtn);
                if (toMainBtn) selectAlter('to', toMainBtn);

                // 如果有分身选择,覆盖本体选择
                if (rel.fromAlterId) {
                    const fromBtn = document.querySelector(`#alter-selector-from button[data-alter-id="${rel.fromAlterId}"]`);
                    if (fromBtn) selectAlter('from', fromBtn);
                }
                if (rel.toAlterId) {
                    const toBtn = document.querySelector(`#alter-selector-to button[data-alter-id="${rel.toAlterId}"]`);
                    if (toBtn) selectAlter('to', toBtn);
                }
            }, 50);

            document.getElementById('relation-modal').classList.add('active');
        }

        // ========== 分身管理 ==========
        function addAlterEgo() {
            if (!window.tempAlterEgos) window.tempAlterEgos = [];

            const name = prompt('分身名称(如:青年张三、老年张三):');
            if (!name || !name.trim()) return;

            window.tempAlterEgos.push({
                id: generateId(),
                name: name.trim(),
                desc: '',
                avatar: null
            });

            updateAlterEgosUI();
        }

        function updateAlterEgosUI() {
            const section = document.getElementById('alter-egos-section');
            const list = document.getElementById('alter-egos-list');

            if (!window.tempAlterEgos || window.tempAlterEgos.length === 0) {
                list.innerHTML = '<div style="color: rgba(255,255,255,0.4); font-size: 12px; padding: 8px;">暂无分身</div>';
                return;
            }

            list.innerHTML = window.tempAlterEgos.map((alter, index) => `
                <div class="alter-ego-card" data-id="${alter.id}">
                    <div class="alter-ego-header">
                        <div class="alter-ego-avatar" style="${alter.avatar ? `background-image: url(${alter.avatar});` : 'background: #667eea;'}">${alter.avatar ? '' : alter.name.charAt(0)}</div>
                        <div class="alter-ego-info">
                            <div class="alter-ego-name">${alter.name}</div>
                            <div class="alter-ego-desc">${alter.desc || '无描述'}</div>
                        </div>
                        <div class="alter-ego-actions">
                            <button class="alter-ego-btn" onclick="editAlterEgo(${index})">编辑</button>
                            <button class="alter-ego-btn delete" onclick="deleteAlterEgo(${index})">删除</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function editAlterEgo(index) {
            const alter = window.tempAlterEgos[index];
            if (!alter) return;

            // 打开分身编辑弹窗
            const modal = document.createElement('div');
            modal.className = 'modal active';
            modal.id = 'alter-ego-edit-modal';
            modal.innerHTML = `
                <div class="modal-content" style="width: 400px;">
                    <div class="modal-title">编辑分身</div>

                    <div class="avatar-upload">
                        <div class="avatar-preview" id="alter-avatar-preview" onclick="document.getElementById('alter-avatar-input').click()">
                            ${alter.avatar ? '' : alter.name.charAt(0)}
                        </div>
                        <div class="avatar-upload-info">
                            <div style="font-size: 14px; margin-bottom: 8px;">分身头像</div>
                            <button class="avatar-upload-btn" onclick="document.getElementById('alter-avatar-input').click()">选择图片</button>
                            <button class="avatar-upload-btn" style="margin-left: 8px;" onclick="clearAlterAvatar(${index})">清除</button>
                            <input type="file" id="alter-avatar-input" accept="image/*" style="display: none;">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">分身名称</label>
                        <input type="text" class="form-input" id="alter-name-input" value="${alter.name}">
                    </div>

                    <div class="form-group">
                        <label class="form-label">分身描述</label>
                        <textarea class="form-input" id="alter-desc-input" style="min-height: 60px;">${alter.desc || ''}</textarea>
                    </div>

                    <div class="modal-actions">
                        <button class="btn btn-secondary" onclick="closeAlterModal()">取消</button>
                        <button class="btn btn-primary" onclick="saveAlterEgo(${index})">保存</button>
                    </div>
                </div>
            `;

            document.body.appendChild(modal);

            // 初始化头像预览
            const preview = document.getElementById('alter-avatar-preview');
            if (alter.avatar) {
                preview.style.backgroundImage = `url(${alter.avatar})`;
                preview.classList.add('has-image');
            }

            // 绑定头像上传事件
            document.getElementById('alter-avatar-input').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;

                if (file.size > 2 * 1024 * 1024) {
                    alert('图片大小不能超过 2MB');
                    return;
                }

                const reader = new FileReader();
                reader.onload = (event) => {
                    window.tempAlterAvatar = event.target.result;
                    const preview = document.getElementById('alter-avatar-preview');
                    preview.style.backgroundImage = `url(${window.tempAlterAvatar})`;
                    preview.textContent = '';
                    preview.classList.add('has-image');
                };
                reader.readAsDataURL(file);
            });

            window.tempAlterAvatar = alter.avatar || null;

            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeAlterModal();
            });
        }

        function closeAlterModal() {
            const modal = document.getElementById('alter-ego-edit-modal');
            if (modal) modal.remove();
            window.tempAlterAvatar = null;
        }

        function saveAlterEgo(index) {
            const name = document.getElementById('alter-name-input').value.trim();
            if (!name) {
                alert('请输入分身名称');
                return;
            }

            window.tempAlterEgos[index].name = name;
